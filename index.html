<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification | Dhruva Construction & Real Estate</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <img src="images/logo.png" class="logo" id="companyLogo">

        <h1>Dhruva Construction & Real Estate</h1>

        <h2>Certificate Verification Portal</h2>

    </div>

    <div class="verified">

        ✅ CERTIFICATE VERIFIED

    </div>

    <div class="certificate-box">

        <div class="photo-section">

            <img id="photo">

        </div>

        <div class="details">

            <p><strong>Certificate No :</strong> <span id="certificateNo"></span></p>

            <p><strong>Name :</strong> <span id="name"></span></p>

            <p><strong>Roll No :</strong> <span id="roll"></span></p>

            <p><strong>Mobile :</strong> <span id="mobile"></span></p>

            <p><strong>Address :</strong> <span id="address"></span></p>

            <p><strong>Project :</strong></p>

            <p id="project"></p>

            <p><strong>Training Tenure :</strong></p>

            <p id="training"></p>

            <p><strong>Performance :</strong>

            <span id="score"></span>/100</p>

        </div>

    </div>

    <div class="footer">

        This certificate has been successfully generated and verified by

        <br><br>

        <strong>Dhruva Construction & Real Estate</strong>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
